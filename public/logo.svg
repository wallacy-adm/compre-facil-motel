<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" width="320" height="110">
  <rect width="320" height="110" fill="#000000"/>

  <!-- Linha teal superior esquerda -->
  <line x1="18" y1="30" x2="136" y2="30" stroke="#2BB8C4" stroke-width="1.3"/>
  <!-- Linha teal superior direita -->
  <line x1="184" y1="30" x2="302" y2="30" stroke="#2BB8C4" stroke-width="1.3"/>

  <!-- Ornamento central: coração estilizado Carpe Diem -->
  <g transform="translate(160,30)">
    <polygon points="0,-9 4.5,-4.5 0,0 -4.5,-4.5" fill="#2BB8C4"/>
    <path d="M0,2 C-7,-5 -13,2 -7,9 L0,16 L7,9 C13,2 7,-5 0,2Z" fill="#2BB8C4"/>
  </g>

  <!-- CARPE -->
  <text x="75" y="66"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="36"
    fill="#FFFFFF"
    letter-spacing="7"
    font-weight="400">CARPE</text>

  <!-- DIEM -->
  <text x="247" y="66"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="36"
    fill="#FFFFFF"
    letter-spacing="7"
    font-weight="400">DIEM</text>

  <!-- Linha teal inferior -->
  <line x1="18" y1="74" x2="302" y2="74" stroke="#2BB8C4" stroke-width="1.3"/>

  <!-- MOTEL -->
  <text x="160" y="96"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="13"
    fill="#FFFFFF"
    letter-spacing="10">MOTEL</text>
</svg>
