name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate token format
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN nao configurado! Va em Settings > Secrets > Actions do repositorio"
            exit 1
          fi
          PREFIX="${SUPABASE_ACCESS_TOKEN:0:4}"
          LEN=${#SUPABASE_ACCESS_TOKEN}
          BODY="${SUPABASE_ACCESS_TOKEN:4}"
          echo "Token: ${SUPABASE_ACCESS_TOKEN:0:8}... (${LEN} chars)"
          if [ "$PREFIX" != "sbp_" ]; then
            echo "::error::Token invalido! Prefixo '${PREFIX}' deve ser 'sbp_'. Gere novo em: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if [ $LEN -lt 44 ]; then
            echo "::error::Token muito curto (${LEN} chars). PAT valido tem 68 chars (sbp_ + 64 hex). Gere novo em: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if ! echo "$BODY" | grep -qE '^[0-9a-f]+$'; then
            echo "::error::Token com chars invalidos apos sbp_. Deve conter apenas [0-9a-f]. Gere novo em: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          echo "Token OK: sbp_ + hex valido (${LEN} chars)"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-push function
        run: |
          OUTPUT=$(supabase functions deploy send-push \
            --project-ref xakercaneezgyqdekmvj \
            --use-api 2>&1)
          EXIT=$?

          # Escreve no Step Summary — visivel diretamente na pagina do run
          {
            echo "## Deploy send-push"
            echo "**Exit code**: \`$EXIT\`"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$OUTPUT"

          if [ $EXIT -eq 0 ]; then
            echo "=== Deploy SUCESSO! ==="
          else
            echo "::error::Deploy falhou (exit $EXIT): $OUTPUT"
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
