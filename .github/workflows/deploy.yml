name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check token type
        run: |
          PREFIX="${SUPABASE_ACCESS_TOKEN:0:4}"
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:10}..."
          if [ "$PREFIX" != "sbp_" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN invalido! Deve comecar com 'sbp_'."
            exit 1
          fi
          echo "Token format OK (sbp_*)"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-push function
        run: |
          set -o pipefail
          supabase functions deploy send-push \
            --project-ref xakercaneezgyqdekmvj \
            --debug \
            2>&1 | tee /tmp/deploy_out.txt || true
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== DEPLOY OUTPUT ==="
          cat /tmp/deploy_out.txt
          echo "=== EXIT CODE: $EXIT_CODE ==="
          exit $EXIT_CODE
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log
          path: /tmp/deploy_out.txt
          if-no-files-found: ignore
