name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check token type
        run: |
          PREFIX="${SUPABASE_ACCESS_TOKEN:0:4}"
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:10}..."
          if [ "$PREFIX" != "sbp_" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN invalido! Deve comecar com 'sbp_'."
            echo "::error::Va em https://supabase.com/dashboard/account/tokens e gere um NOVO token pessoal."
            exit 1
          fi
          echo "Token format OK (sbp_*)"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-push function
        run: |
          supabase functions deploy send-push \
            --project-ref xakercaneezgyqdekmvj \
            2>&1 | tee /tmp/deploy_out.txt
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Deploy falhou. Output:"
            cat /tmp/deploy_out.txt
            exit $STATUS
          fi
          echo "Deploy concluido com sucesso!"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
