name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check token type
        run: |
          PREFIX="${SUPABASE_ACCESS_TOKEN:0:4}"
          LEN=${#SUPABASE_ACCESS_TOKEN}
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:10}..."
          echo "Token length: $LEN caracteres"
          if [ "$PREFIX" != "sbp_" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN invalido! Deve comecar com 'sbp_'. Prefixo atual: $PREFIX"
            exit 1
          fi
          if [ $LEN -lt 40 ]; then
            echo "::error::Token muito curto ($LEN chars). PAT valido deve ter 40+ chars. Formato: sbp_0102...1920"
            exit 1
          fi
          echo "Token OK: prefixo sbp_, comprimento $LEN"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-push function
        run: |
          # Capture output and exit code correctly (without pipe to avoid tee masking errors)
          OUTPUT=$(supabase functions deploy send-push \
            --project-ref xakercaneezgyqdekmvj \
            --use-api 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          if [ $EXIT -eq 0 ]; then
            echo "=== Deploy --use-api SUCESSO! ==="
          else
            echo "=== --use-api falhou (exit $EXIT), tentando sem --use-api ==="
            OUTPUT2=$(supabase functions deploy send-push \
              --project-ref xakercaneezgyqdekmvj 2>&1)
            EXIT2=$?
            echo "$OUTPUT2"
            if [ $EXIT2 -ne 0 ]; then
              echo "::error::Ambos os metodos de deploy falharam!"
              echo "Erro --use-api: $OUTPUT"
              echo "Erro sem --use-api: $OUTPUT2"
              exit 1
            fi
            echo "=== Deploy sem --use-api SUCESSO! ==="
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
