name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate and test token
        run: |
          # Remove whitespace/newlines (common copy-paste issue)
          CLEAN_TOKEN=$(printf '%s' "$SUPABASE_ACCESS_TOKEN" | tr -d '[:space:]')
          LEN=${#CLEAN_TOKEN}
          PREFIX="${CLEAN_TOKEN:0:4}"
          BODY="${CLEAN_TOKEN:4}"

          echo "Token: ${CLEAN_TOKEN:0:8}... (${LEN} chars)"

          if [ "$PREFIX" != "sbp_" ]; then
            echo "::error::Token invalido! Prefixo '${PREFIX}' deve ser 'sbp_'. Gere novo em: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if [ $LEN -lt 44 ]; then
            echo "::error::Token muito curto (${LEN} chars apos trim). PAT valido tem 68 chars (sbp_ + 64 hex). Gere novo em: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if ! echo "$BODY" | grep -qE '^[0-9a-f]+$'; then
            echo "::error::Token com chars invalidos apos sbp_ (deve ser apenas [0-9a-f]). Gere novo em: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          echo "Formato OK. Testando autenticacao na API Supabase..."

          # Test auth against Supabase Management API
          HTTP_CODE=$(curl -s -o /tmp/auth_resp.txt -w "%{http_code}" \
            -H "Authorization: Bearer $CLEAN_TOKEN" \
            "https://api.supabase.com/v1/projects")
          BODY_RESP=$(cat /tmp/auth_resp.txt | head -c 300)

          echo "Auth HTTP: $HTTP_CODE"
          echo "Auth response: $BODY_RESP"

          {
            echo "## Token Validation"
            echo "- Length: $LEN"
            echo "- Auth HTTP: $HTTP_CODE"
            echo '```json'
            echo "$BODY_RESP"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Token rejeitado pela API Supabase (HTTP $HTTP_CODE). Token expirado ou invalido. Gere novo em: https://supabase.com/dashboard/account/tokens — depois atualize o secret SUPABASE_ACCESS_TOKEN em Settings > Secrets > Actions"
            exit 1
          fi

          echo "Token autentico e valido!"
          # Export cleaned token for deploy step
          echo "SUPABASE_ACCESS_TOKEN_CLEAN=$CLEAN_TOKEN" >> "$GITHUB_ENV"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-push function
        run: |
          OUTPUT=$(SUPABASE_ACCESS_TOKEN="$SUPABASE_ACCESS_TOKEN_CLEAN" \
            supabase functions deploy send-push \
              --project-ref xakercaneezgyqdekmvj \
              --use-api 2>&1)
          EXIT=$?

          {
            echo "## Deploy send-push"
            echo "**Exit code**: \`$EXIT\`"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$OUTPUT"

          if [ $EXIT -eq 0 ]; then
            echo "=== Deploy SUCESSO! ==="
          else
            echo "::error::Deploy falhou (exit $EXIT): $OUTPUT"
            exit 1
          fi
