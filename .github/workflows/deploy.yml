name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy send-push function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Trim whitespace/newlines (common copy-paste issue)
          CLEAN_TOKEN=$(printf '%s' "$SUPABASE_ACCESS_TOKEN" | tr -d '[:space:]')

          echo "Token length: ${#CLEAN_TOKEN}"
          echo "Token prefix: ${CLEAN_TOKEN:0:4}"

          # set +e: evita que bash -e aborte antes de capturar exit code
          set +e
          OUTPUT=$(SUPABASE_ACCESS_TOKEN="$CLEAN_TOKEN" \
            supabase functions deploy send-push \
            --project-ref xakercaneezgyqdekmvj \
            --use-api 2>&1)
          EXIT=$?
          set -e

          echo "$OUTPUT"

          {
            echo "## Deploy send-push"
            echo "**Exit code:** `$EXIT`"
            echo ""
            echo "```"
            echo "$OUTPUT"
            echo "```"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ $EXIT -eq 0 ]; then
            echo "=== Deploy SUCESSO! ==="
          else
            echo "::error::Deploy falhou (exit $EXIT). Veja output acima."
            exit 1
          fi
