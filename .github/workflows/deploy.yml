name: Validate Edge Functions

# IMPORTANTE: Este projeto roda no Lovable (backend gerenciado).
# O Supabase do projeto pertence à org da Lovable — deploy via CLI externo
# resulta em 403. O deploy das Edge Functions é gerenciado PELA LOVABLE.
# Este workflow valida os arquivos e registra o status; não faz deploy direto.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  validate:
    name: Validate & Document
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate function files
        run: |
          {
            echo "## Edge Functions — Validação"
            echo ""
            echo "| Função | Status | Tamanho |"
            echo "|--------|--------|---------|"
          } >> "$GITHUB_STEP_SUMMARY"

          FUNCTIONS_DIR="supabase/functions"
          FAILED=0

          if [ ! -d "$FUNCTIONS_DIR" ]; then
            echo "❌ Diretório $FUNCTIONS_DIR não encontrado" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          for fn in "$FUNCTIONS_DIR"/*/; do
            [ -d "$fn" ] || continue
            fn_name=$(basename "$fn")
            if [ -f "$fn/index.ts" ]; then
              size=$(wc -c < "$fn/index.ts")
              echo "| \`$fn_name\` | ✅ OK | ${size} bytes |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$fn_name\` | ⚠️ sem index.ts | — |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ $FAILED -ne 0 ]; then
            echo "::error::Uma ou mais funções estão sem index.ts."
            exit 1
          fi

      - name: Deploy notice
        run: |
          {
            echo "---"
            echo "### 🚀 Deploy"
            echo ""
            echo "> **Este projeto usa Lovable como plataforma gerenciada.**"
            echo "> O deploy das Edge Functions é realizado pela Lovable internamente."
            echo "> Para deploy manual: use o chat da Lovable e solicite o deploy."
            echo ""
            echo "✅ Validação concluída com sucesso."
          } >> "$GITHUB_STEP_SUMMARY"
