app = "ntfy-comprafacil"
primary_region = "gru"   # São Paulo — mais próximo do Brasil

[build]
  image = "binwiederhier/ntfy:latest"

[env]
  NTFY_CONFIG_FILE = "/etc/ntfy/server.yml"

[[services]]
  protocol = "tcp"
  internal_port = 80

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/v1/health"
    protocol = "http"
    tls_skip_verify = false

[[mounts]]
  source = "ntfy_data"
  destination = "/var/cache/ntfy"
  initial_size = "1gb"

[[mounts]]
  source = "ntfy_config"
  destination = "/etc/ntfy"
  initial_size = "100mb"
